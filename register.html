<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký — AntiGravity Pro</title>
  <meta name="description" content="Tạo tài khoản AntiGravity Pro miễn phí — nhận ưu đãi referral và bắt đầu mua mod game ngay." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>
  <div class="bg-atmosphere" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-stars"></div>
  </div>

  <header class="navbar">
    <div class="container navbar__inner">
      <a href="../index.html" class="brand">
        <span class="brand__mark"><i class="fa-solid fa-meteor"></i></span>
        <span>
          AntiGravity <span style="color: var(--neon-cyan)">Pro</span>
          <span class="brand__sub">MOD GAME &amp; SCRIPT STORE</span>
        </span>
      </a>
      <div class="nav-actions">
        <a href="../index.html" class="btn btn-ghost btn-sm">
          <i class="fa-solid fa-arrow-left"></i> Về trang chủ
        </a>
      </div>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-bg-orbit" aria-hidden="true"></div>

    <div class="auth-card">
      <div class="auth-card__head">
        <span class="brand__mark" style="width: 52px; height: 52px; font-size: 1.3rem; border-radius: 14px;">
          <i class="fa-solid fa-user-astronaut"></i>
        </span>
        <h1>Tạo tài khoản mới</h1>
        <p>Gia nhập AntiGravity Pro — nhận ưu đãi referral ngay từ đầu</p>
      </div>

      <form id="registerForm" novalidate>
        <div class="field-group">
          <label for="regUsername">Tên đăng nhập</label>
          <div class="field-input">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="regUsername" name="username" placeholder="vd: caunhanvip99" autocomplete="username" required />
          </div>
        </div>

        <div class="field-group">
          <label for="regEmail">Email</label>
          <div class="field-input">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="regEmail" name="email" placeholder="ten@email.com" autocomplete="email" required />
          </div>
        </div>

        <div class="field-group">
          <label for="regPassword">Mật khẩu</label>
          <div class="field-input">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="regPassword" name="password" placeholder="Ít nhất 8 ký tự" autocomplete="new-password" required />
            <button type="button" class="field-toggle-pass" data-toggle-pass="regPassword" aria-label="Hiện/ẩn mật khẩu">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="field-group">
          <label for="regReferral">Mã giới thiệu (không bắt buộc)</label>
          <div class="field-input">
            <i class="fa-solid fa-gift"></i>
            <input type="text" id="regReferral" name="referral" placeholder="VD: AGP-REF-8X2K" autocomplete="off" />
          </div>
        </div>

        <div class="field-row-between" style="margin-top: -4px">
          <label class="checkbox-line">
            <input type="checkbox" name="terms" required />
            Tôi đồng ý với <a href="#" class="link-accent">Điều khoản dịch vụ</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-block">
          <i class="fa-solid fa-user-plus"></i> Đăng ký
        </button>
      </form>

      <div class="auth-divider">Hoặc đăng ký với</div>

      <div class="social-auth">
        <button type="button"><i class="fa-brands fa-google"></i> Google</button>
        <button type="button"><i class="fa-brands fa-facebook-f"></i> Facebook</button>
      </div>

      <p class="auth-card__foot">
        Đã có tài khoản? <a href="login.html" class="link-accent">Đăng nhập</a>
      </p>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script>
    // Mock auth — replace with real API call later
    document.getElementById("registerForm").addEventListener("submit", (e) => {
      e.preventDefault();
      window.location.href = "dashboard.html";
    });

    document.querySelectorAll("[data-toggle-pass]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const input = document.getElementById(btn.dataset.togglePass);
        const icon = btn.querySelector("i");
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        icon.className = isPass ? "fa-solid fa-eye-slash" : "fa-solid fa-eye";
      });
    });
  </script>
</body>
</html>
